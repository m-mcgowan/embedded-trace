; embedded-trace: basic scope tracing example (host)
;
; Build & run:
;   pio run -e basic_scopes -t exec
;
; Capture output for Perfetto:
;   pio run -e basic_scopes -t exec --silent > trace.jsonl

[platformio]
src_dir = .

[env:basic_scopes]
platform = native
build_flags =
    -std=gnu++17
    -O0 -g
    -DEMBEDDED_TRACE_ENABLED=1
    -I ../../src
build_src_filter =
    +<main.cpp>
    +<../../src/embedded_trace/>
    +<../../src/embedded_trace_esp32/>
