; embedded-trace: ESP32-S3 → Serial → Perfetto example
;
; Build & flash:
;   pio run -e esp32_perfetto -t upload
;
; Capture trace output:
;   pio device monitor -b 115200 > trace.jsonl
;   # Stop with Ctrl-T Ctrl-X. Wrap as {"traceEvents":[...]} and open in
;   # https://ui.perfetto.dev

[platformio]
src_dir = .

[env:esp32_perfetto]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DEMBEDDED_TRACE_ENABLED=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I ../../src
build_src_filter =
    +<main.cpp>
    +<../../src/embedded_trace/>
    +<../../src/embedded_trace_esp32/>
